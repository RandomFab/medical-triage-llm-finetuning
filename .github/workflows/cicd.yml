name: CI/CD Pipeline Medical AI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code-quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.10
        run: uv python install 3.10

      - name: Install dependencies for testing
        run: |
          uv venv .venv --python 3.10
          uv sync --all-extras --dev

      - name: Run code quality checks (Ruff)
        run: |
          .venv/bin/ruff check .

      - name: Run tests
        run: |
          .venv/bin/pytest tests/

  build-and-push-docker:
    needs: code-quality-and-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/medical-qwen-api

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Login GHCR avec le PAT dédié
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # 2. Télécharger le modèle mergé DPO depuis GCS
            # Note : le run ID MLflow est fixé au run de merge DPO actuel.
            # Limitation connue : à mettre à jour si un nouveau merge est effectué.
            mkdir -p ~/models

            # chargement du nouveau model sft
            gsutil -m cp -r \
              gs://p14-medical-data/mlflow-artifacts/1/22341f87bfd0420ca7fbc43fa20e2a1a/artifacts/merged_model_sft_for_deployment \
              ~/models/

            # 3. Pull la nouvelle image
            docker pull ghcr.io/randomfab/medical-qwen-api:main

            # 4. Arrêter et supprimer l'ancien conteneur
            docker stop medical-api || true
            docker rm medical-api || true

            # 5. Lancer le nouveau conteneur avec GPU et modèle monté en volume
            docker run -d \
              --name medical-api \
              --gpus all \
              -p 8000:8000 \
              -v ~/models/merged_model_for_deployment:/app/models/merged_model_for_deployment \
              -e GCS_MERGED_MODEL_PATH=/app/models/merged_model_for_deployment \
              ghcr.io/randomfab/medical-qwen-api:main