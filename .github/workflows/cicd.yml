name: CI/CD Pipeline Medical AI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code-quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.10
        run: uv python install 3.10

      - name: Install dependencies for testing
        run: |
          uv pip install --system fastapi uvicorn pytest httpx pydantic
          # Note: vLLM nécessite un GPU, on évite donc de l'installer entièrement 
          # sur le runner CPU standard de GitHub Actions pour de simples tests unitaires.

      # - name: Run tests
      #   run: |
      #     pytest tests/

  build-and-push-docker:
    needs: code-quality-and-tests
    runs-on: ubuntu-latest
    # Condition : Ne construire l'image que si on pousse sur la branche main (et pas juste sur une PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        # Vous devez configurer les permissions GITHUB_TOKEN dans les paramètres de votre dépôt
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/medical-qwen-api

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Cloud server
        # Ceci est un exemple générique pour se connecter à un serveur (ex: VM AWS/GCP/Azure)
        # et lui dire de pull la nouvelle image et redémarrer le conteneur.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.repository }}/medical-qwen-api:main
            docker stop medical-api || true
            docker rm medical-api || true
            # Note: Le montage du dossier models dépend du chemin sur votre serveur
            docker run -d --name medical-api --gpus all -p 8000:8000 \
              -v /path/to/server/models:/app/models \
              -e MODEL_PATH=/app/models/merged_model_for_deployment \
              ghcr.io/${{ github.repository }}/medical-qwen-api:main
